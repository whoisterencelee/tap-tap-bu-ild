<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sustainable Craft</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />
  <link rel="icon" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
</head>

<body>

<head>
  <style>
    body { margin: 0; overflow: hidden; }

    .unselectable { user-select:none; }
    .blink { animation: blinker 1s linear infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    #graph { width: 100vw; height: 100vh; }

    .nodes-layer {z-index: 2; }
    .node-label { 
      cursor: move;
      fill: white;
      stroke: #333;
      stroke-width: 1px;
      rx: 5px; /* Rounded corners */
    }
    .node-text {
      font-family: Arial;
      font-size: 12px;
      /* fill: white; */
      pointer-events: none; /* Prevent text from blocking drag */
    }

    .links-layer { z-index: 1; }
    .link { stroke: #ededed; stroke-width: 1px; }

    .input-node rect {
	    stroke-dasharray: 3; /* Dashed border to indicate editing */
    }

    .selected > .node-label { fill: #333 !important; }
    .selected > .node-text { fill: white !important; }

    .shake > rect { animation: shake 500ms ease-in-out infinite; }
    @keyframes shake {
	    10% { transform: translate(1px, 1px); }
	    20% { transform: translate(0, 0); }
	    30% { transform: translate(-1px, -1px); }
	    42% { transform: translate(0, 0); }
	    52% { transform: translate(1px, -1px); }
	    60% { transform: translate(0, 0); }
	    70% { transform: translate(-1px, 1px); }
	    80% { transform: translate(0, 0); }
	    90% { transform: translate(-1px, -1px); }
	    100% { transform: translate(0, 0); }
    }

  </style>
</head>
<body>
	<instructions class=unselectable style=position:absolute;top:1em;width:100vw;text-align:center;font-size:x-small; >
	double tap adds &emsp; select <loading>craft items</loading> &emsp; learn hold &emsp; drag out deletes &emsp; type :reset clears
	</instructions>

  <svg id="graph" class=unselectable ></svg>
  <script>

    // Initialize SVG and dimensions
    const svg = d3.select("#graph");
    const width = window.innerWidth;
    const height = window.innerHeight;
    svg.attr("width", width).attr("height", height);

    // Sample data: nodes and links
    let nodes = [
      //{ id: 1, x: 100, y: 100, name: "Orange peel" },
      //{ id: 2, x: 300, y: 100, name: "Oil" },
      //{ id: 3, x: 200, y: 300, name: "Steam" }
    ];
    let links = [
      //{ source: 1, target: 2, result: [ "Orange peel" , "Oil" ] }
    ];
    let nodeID = 1978

    // Data storage
    function saveGraph(){ localStorage.setItem( 'sustainableCraft' , JSON.stringify( { nodes : nodes , links : links } ) ) }
    function loadGraph( savedData ){
    	    savedData? savedData : savedData = localStorage.getItem( 'sustainableCraft' )
	    if( !savedData ) return false
	    console.log( "used " + savedData.length + " / 5,000,000 of localStorage" )
	    let graphData = JSON.parse( savedData )
	    nodes = graphData.nodes
	    links = graphData.links
	    nodeID = nodes.reduce( ( a , b ) => a > b.id ? a : b.id  ) // find the biggest nodeID
	    return true
    }
    function changeGraph(){
	    updateGraph()
	    saveGraph()
    }
    function clearGraph(){
	    localStorage.removeItem( 'sustainableCraft')
	    location.reload()
    }
    loadGraph()

    // Selection Management
    let selectedNodes = [];     // Tracks currently selected nodes
    let selectionTimer = null; 	// Handles the 3-second before submit to allow more selection

    let holdTimer = null	// Handles the 2 second holding
    let isHolding = false
    let holdDrag = null

    // User Interaction
    const drag = d3.drag()
	    .on( "start" , function( event , d ){
		    holdDrag = d3.select( this )
		    startHoldTimer( d )
	    } )
	    .on("drag", function( event, d ){  // do not use arrow function, otherwise loose this context

		    holdDrag = d3.select( this )

		    if( isHolding ) return  // stop the first return from other tab

		    // really draggging
		    // console.log( "dx " + Math.abs( event.dx ) + " dy " + Math.abs( event.dy ) )
		    if( Math.abs( event.dx ) >= 1 || Math.abs( event.dy ) >= 1 ) cancelHold()

		    // drag outside boundry to delete
		    if( event.x < 20 || event.x > ( window.innerWidth - 20 ) || event.y < 20 || event.y > ( window.innerHeight - 20 ) ){

			    if( crafting < 1 ) {  // delete if not crafting
				    nodes = nodes.filter(n => n !== d)
				    links = links.filter(n => n.target != d.id && n.source != d.id )
			    }

		    } else {

			    d.x = event.x
			    d.y = event.y

		    }

		    changeGraph()
	    } )
	    .on( "end" , function( event , d ){
		    cancelHold()
		    isHolding = false
	    } )

    function startHoldTimer(nodeData) {
	    isHolding = false
	    if( !holdTimer ) {
		    holdTimer = setTimeout(() => {
			    isHolding = true
			    if( holdDrag ) {
	//			    holdDrag.interrupt()  // not need to be so violent, state machine can handle it now
				    holdDrag = null
			    }
			    openWikipedia(nodeData.name);
		    }, 2500 );
	    }
    }

    function cancelHold() {
	    if (holdTimer) {
		    clearTimeout(holdTimer);
		    holdTimer = null;
	    }
    }

    function openWikipedia(searchTerm) {
	    // Clean the search term (Wikipedia URLs don't like spaces)
	    const encodedTerm = encodeURIComponent(searchTerm.replace(/\s+/g, '_'));
	    const wikiUrl = `https://en.wikipedia.org/wiki/${encodedTerm}`;
	    window.open(wikiUrl, '_blank', 'noopener,noreferrer');
    }

    // Scaling text labels
    function getTextWidth(text, fontSize = "12px", fontFamily = "Arial") {
	      const canvas = document.createElement("canvas");
	      const context = canvas.getContext("2d");
	      context.font = `${fontSize} ${fontFamily}`;
	      return context.measureText(text).width;
    }

    // Layering
    svg.append("g").attr("class", "links-layer")
    svg.append("g").attr("class", "nodes-layer")

    // MAIN LOOP
    function updateGraph() {

	    // Update links (lines)
	    const linkElements = svg.select(".links-layer").selectAll(".link")
		    .data(links)
		    .join("line")
		    .classed( "link" , true )
		    .attr("x1", d => nodes.find(n => n.id === d.source).x)
		    .attr("y1", d => nodes.find(n => n.id === d.source).y)
		    .attr("x2", d => nodes.find(n => n.id === d.target).x)
		    .attr("y2", d => nodes.find(n => n.id === d.target).y);

	    // Update nodes (rectangles + text)
	    const nodeGroups = svg.select(".nodes-layer").selectAll(".node-group")
		    .data(nodes)
		    .join("g")
		    .classed( "node-group" , true )
		    .call(drag);

	    // Draw label background (auto-width rectangle)
	    nodeGroups.selectAll(".node-label")
		    .data(d => [d])
		    .join("rect")
		    .classed( "node-label" , true )
		    .attr("x", d => d.x - 15 - getTextWidth(d.name)/2) // Center based on text width
		    .attr("y", d => d.y - 15)
		    .attr("width", d => getTextWidth(d.name) + 30) // 15px padding each side
		    .attr("height", 30);

	    // Draw text (centered inside rectangle)
	    nodeGroups.selectAll(".node-text")
		    .data(d => [d])
		    .join("text")
		    .classed( "node-text" , true )
		    .attr("x", d => d.x)
		    .attr("y", d => d.y + 5)
		    .attr("text-anchor", "middle")
		    .text(d => d.name);

	    // Select Things
	    nodeGroups.on("click", function(event, d) {
		    event.stopPropagation();

		    // Toggle selection directly via D3
		    const nodeGroup = d3.select(this);
		    const isSelected = nodeGroup.classed("selected");
		    nodeGroup.classed("selected", !isSelected);

		    // Update array (no ID needed - uses object reference)
		    if (isSelected) {
			    selectedNodes = selectedNodes.filter(n => n !== d); // Remove by reference
		    } else {
			    selectedNodes.push(d); // Add by reference
		    }

		    if( selectedNodes.length < 1 ) clearTimeout(selectionTimer) // all selections removed
		    else resetSelectionTimer(); // Reset 3-second clear
	    });

    }  // updateGraph

    // Initialize
    updateGraph();

    // Double click create new node
    svg.on("dblclick", (event) => {

	      // Remove any existing input nodes first
	      svg.selectAll(".input-node").remove();

	      const x = event.offsetX;
	      const y = event.offsetY;
	      
	      // Create temporary input group
	      const inputGroup = svg.append("g")
	        .attr("class", "input-node")
	        .attr("transform", `translate(${x},${y})`);
	      
	      // Create expanding rectangle
	      const rect = inputGroup.append("rect")
	        .attr("class", "node-label")
	    	.attr("x", -30)
	        .attr("y", -15)
	    	.attr("width", 60)
	        .attr("height", 30);
	      
	      // Create input field
	      const fo = inputGroup.append("foreignObject")
	    	.attr("x", -30)
	        .attr("y", -10)
	    	.attr("width", 50)
	        .attr("height", 20);
	      
	      const input = fo.append("xhtml:input")
	        .attr("type", "text")
	        .style("width", "100%")
	        .style("height", "100%")
	        .style("border", "none")
	        .style("padding", "0")
	    	.style("outline", "0")
	        .style("font-size", "12px")
	        .style("text-align", "center")
	        .node();
	      

	      // Handle text input width resizing
	      input.addEventListener("input", function() {
		          const text = this.value || "New";
		          const width = Math.max(getTextWidth(text) + 30, 60); // Min width 60px
		          
		          // Update rectangle and input field
		          rect.attr("width", width)
		              .attr("x", -width/2);
		          
		          fo.attr("width", width - 10)
		             .attr("x", -width/2 + 5);
		        });
	      
	    // Finalize node creation
	    function createNode( e ) {
		    if (e.key === "Enter" ){
			    if( e.target.value.trim() ) {
				    let item = e.target.value.trim()
				    if( item.toLowerCase() === ":reset" ) return clearGraph()
				    item = item.charAt(0).toUpperCase() + item.slice(1).toLowerCase();
				    nodes.push({
					    id: ++nodeID,
					    x: x,
					    y: y,
					    name: item
				    });
				    changeGraph();
			    }
			    inputGroup.remove();
		    } else if (e.key === "Escape") {
			    inputGroup.remove();
		    }
	    }

	    input.addEventListener("keydown", createNode )
	    input.addEventListener("blur", function( e ){ e.key="Enter"; createNode( e ) })
	      
	    input.focus()
    }); // Create new node

    let crafting = 0

    // selection timer
    function resetSelectionTimer() {
	      clearTimeout(selectionTimer);
	      selectionTimer = setTimeout(() => {

		      var selectedDOM = svg.selectAll(".node-group.selected")

		      if( selectedNodes.length < 1 ) return

		      selectedDOM.classed("shake", true);

		      let selectedItems = Array.from( selectedNodes )
		      let items = selectedItems.map( n => n.name )
		      let selectedLast = selectedItems[ selectedItems.length - 1 ]
			
		      // loading
		      crafting++
		      let loading = document.getElementsByTagName( "loading" )
		      for( var d = 0 ; d < loading.length ; d++ ){ loading[ d ].classList.add( 'blink' ) }

		      console.log( items )

		      // call server
		      fetch( 'https://craft.functional.limited/' , {
			      method: 'POST' ,
			      headers: {
				      'Content-Type' : 'application/json' ,
			      },
			      body: JSON.stringify( items )
		      }).then( response => {
			      if( !response.ok) {
				      console.error( 'Server error: ' , response.status )
			      }

			      response.json().then( r => {

				      console.log( r.result )

				      selectedDOM.classed( "selected shake", false )

				      r.result.forEach( ( item , i ) => {

					      // set initial position avoid boundries
					      const newID = ++nodeID
					      //let cordx = selectedLast.x + ( i + 1 ) * 10 + ( i * i ) * 10
					      let cordx = selectedLast.x + 30
					      if( cordx > window.innerWidth ) cordx = window.innerWidth - 50
					      let cordy = selectedLast.y + ( i + 1 ) * 40
					      if( cordy > window.innerHeight ) cordy = window.innerHeight - 50

					      nodes.push({
						      id: newID ,
						      x: cordx ,
						      y: cordy ,
						      name: item
					      });

					      // create links
					      selectedItems.forEach( prior => {
						      links.push({
							      source: prior.id ,
							      target: newID ,
							      result: [ prior.name , item ]
						      } )
						} )
				      })

				      changeGraph();

				      // stop crafting
				      if( --crafting < 1 ) for( var d = 0 ; d < loading.length ; d++ ){ loading[ d ].classList.remove( 'blink' ) }
			      })

		      }).catch( error => {
			      console.error( 'Network error: ' , error )
		      })

		      selectedNodes = [];
	      }, 2000);
    }
		      
</script>

</body>
</html>
